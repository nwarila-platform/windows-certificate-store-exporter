name: CI

# Consumer workflow from NWarila/powershell-template. Lints workflows
# (actionlint), runs PSScriptAnalyzer with the PSGallery ruleset, and executes
# the Pester v5 suite with NUnit output and a coverage target.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  analyze:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Settings PSGallery -Recurse
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
            $warnings = @($results | Where-Object { $_.Severity -eq 'Warning' })
            Write-Host "PSScriptAnalyzer found $($errors.Count) error(s) and $($warnings.Count) warning(s)."
            if ($errors.Count -gt 0 -or $warnings.Count -gt 0) {
              throw "PSScriptAnalyzer reported findings. Fix them or adjust PSScriptAnalyzerSettings.psd1."
            }
          } else {
            Write-Host "PSScriptAnalyzer found no issues."
          }

  test:
    name: Pester
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Pester v5
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
      - name: Run Pester
        shell: pwsh
        run: ./tests/Invoke-Tests.ps1 -MinimumCoverage 80
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pester-results
          path: TestResults/
          if-no-files-found: ignore
