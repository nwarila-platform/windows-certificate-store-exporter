name: CI

# Windows-only tool: validate on Windows PowerShell 5.1.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_ARCHIVE_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned gitleaks
        shell: bash
        run: |
          set -euo pipefail

          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksums="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          install_dir="${RUNNER_TEMP}/gitleaks"

          curl --fail --location --show-error --silent --remote-name "${base_url}/${archive}"
          curl --fail --location --show-error --silent --remote-name "${base_url}/${checksums}"

          expected_line="${GITLEAKS_ARCHIVE_SHA256}  ${archive}"
          grep --fixed-strings --line-regexp -- "${expected_line}" "${checksums}"
          printf '%s  %s\n' "${GITLEAKS_ARCHIVE_SHA256}" "${archive}" | sha256sum --check --strict

          mkdir -p "${install_dir}"
          tar -xzf "${archive}" -C "${install_dir}" gitleaks
          chmod 0755 "${install_dir}/gitleaks"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        shell: bash
        run: gitleaks detect --source . --redact --exit-code 1 --no-banner

  build:
    name: build (windows-powershell51)
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install PowerShell test modules (Windows PowerShell)
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop

      - name: Run build (Windows PowerShell)
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build.ps1 -Task All

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pester-results-windows-powershell51
          path: |
            build/testResults.xml
            build/coverage.xml
          if-no-files-found: ignore
