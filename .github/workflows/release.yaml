name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      hashes: ${{ steps.subjects.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install PowerShell test modules (Windows PowerShell)
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force -ErrorAction Stop

      - name: Run build (Windows PowerShell)
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build.ps1 -Task All

      - name: Create SHA-256 sidecar
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ArtifactPath = Join-Path -Path $PWD -ChildPath 'build\Export-CertificateStoreBundle.ps1'
          $SidecarPath = '{0}.sha256' -f $ArtifactPath
          $ArtifactName = Split-Path -Path $ArtifactPath -Leaf
          $Hash = (Get-FileHash -Algorithm SHA256 -Path $ArtifactPath).Hash
          $SidecarText = '{0}  {1}{2}' -f $Hash, $ArtifactName, "`n"

          [System.IO.File]::WriteAllText(
            $SidecarPath,
            $SidecarText,
            [System.Text.UTF8Encoding]::new($False)
          )

          Get-Content -Path $SidecarPath

      - name: Compute SLSA base64 subjects
        id: subjects
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ArtifactPath = Join-Path -Path $PWD -ChildPath 'build\Export-CertificateStoreBundle.ps1'
          $ArtifactName = Split-Path -Path $ArtifactPath -Leaf
          $HashLower = (Get-FileHash -Algorithm SHA256 -Path $ArtifactPath).Hash.ToLowerInvariant()
          $Subject = '{0}  {1}{2}' -f $HashLower, $ArtifactName, "`n"
          $Base64 = [System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($Subject))
          "hashes=$Base64" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'

          $ApiBase = 'https://api.github.com'
          $UploadBase = 'https://uploads.github.com'
          $TagName = $env:TAG_NAME
          $Repository = $env:REPOSITORY
          $EscapedTagName = [System.Uri]::EscapeDataString($TagName)
          $Headers = @{
            Accept                 = 'application/vnd.github+json'
            Authorization          = 'Bearer {0}' -f $env:GITHUB_TOKEN
            'User-Agent'           = 'windows-certificate-store-exporter-release-workflow'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $ReleaseNotes = @(
            'Release assets are generated by .\build.ps1 -Task All on Windows PowerShell 5.1.'
            ''
            'SLSA build provenance (Export-CertificateStoreBundle.ps1.intoto.jsonl) is attached and signed via Sigstore; verify with slsa-verifier (see the README Releases section). The SHA-256 sidecar is a quick offline integrity check. Authenticode publisher signing is deferred.'
          ) -join "`n"
          $ReleaseRequest = @{
            tag_name   = $TagName
            name       = $TagName
            body       = $ReleaseNotes.Trim()
            draft      = $False
            prerelease = $False
          } | ConvertTo-Json

          try {
            $Release = Invoke-RestMethod `
              -Uri ('{0}/repos/{1}/releases/tags/{2}' -f $ApiBase, $Repository, $EscapedTagName) `
              -Headers $Headers `
              -Method Get
          }
          catch {
            $Response = $PSItem.Exception.Response
            if ($Null -eq $Response -or [System.Int32]$Response.StatusCode -ne 404) {
              throw
            }

            $Release = Invoke-RestMethod `
              -Uri ('{0}/repos/{1}/releases' -f $ApiBase, $Repository) `
              -Headers $Headers `
              -Method Post `
              -Body $ReleaseRequest `
              -ContentType 'application/json'
          }

          $ExistingAssets = @(
            Invoke-RestMethod `
              -Uri $Release.assets_url `
              -Headers $Headers `
              -Method Get
          )
          $AssetPaths = @(
            (Join-Path -Path $PWD -ChildPath 'build\Export-CertificateStoreBundle.ps1'),
            (Join-Path -Path $PWD -ChildPath 'build\Export-CertificateStoreBundle.ps1.sha256')
          )

          foreach ($AssetPath in $AssetPaths) {
            $AssetName = Split-Path -Path $AssetPath -Leaf

            $ExistingAssets |
              Where-Object -FilterScript { $PSItem.name -eq $AssetName } |
              ForEach-Object -Process {
                Invoke-RestMethod `
                  -Uri ('{0}/repos/{1}/releases/assets/{2}' -f $ApiBase, $Repository, $PSItem.id) `
                  -Headers $Headers `
                  -Method Delete
              }

            $UploadUri = (
              '{0}/repos/{1}/releases/{2}/assets?name={3}' -f
              $UploadBase,
              $Repository,
              $Release.id,
              [System.Uri]::EscapeDataString($AssetName)
            )

            Invoke-RestMethod `
              -Uri $UploadUri `
              -Headers $Headers `
              -Method Post `
              -ContentType 'application/octet-stream' `
              -InFile $AssetPath
          }

  provenance:
    name: provenance
    needs: release
    permissions:
      id-token: write   # OIDC identity for keyless Sigstore/Fulcio signing
      contents: write   # attach the .intoto.jsonl provenance to the release
      actions: read     # the generator reads this workflow run
    # SLSA REQUIREMENT - do NOT SHA-pin this one: the trusted builder MUST be referenced by a full
    # semantic version tag (@vX.Y.Z). slsa-verifier resolves/trusts the builder by that tag; a commit
    # SHA (or truncated @v2 / @v2.1) makes verification FAIL. This is the deliberate, documented
    # exception to the house "pin every action by commit SHA" rule. Renovate must preserve @vX.Y.Z.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      provenance-name: Export-CertificateStoreBundle.ps1.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}
